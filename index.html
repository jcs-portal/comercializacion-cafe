<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <meta name="theme-color" content="#2C1810" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finanzas Ventas Café" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Finanzas Ventas Café (comercialización de café) para productores de San Adolfo, Huila · Ubuntu Café" />
  <link rel="manifest" href="/comercializacion-cafe/manifest.json" />
  <link rel="apple-touch-icon" href="/comercializacion-cafe/icons/icon-192.png" />
  <title>Finanzas Ventas Café · Ubuntu Café</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <script src="https://unpkg.com/docx@9.7.1/dist/index.umd.cjs"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overscroll-behavior: none; }
    body { background: #F5EDD8; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    input, select, textarea { font-size: 16px !important; font-family: inherit; }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    button { min-height: 44px; touch-action: manipulation; -webkit-appearance: none; cursor: pointer; }
    .scroll-area { -webkit-overflow-scrolling: touch; overflow-y: auto; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .seccion { animation: fadeIn 0.25s ease; }
    .header-safe { padding-top: max(18px, env(safe-area-inset-top)); }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 5px 4px; font-size: 11px; }
    #ccaf-offline-banner { display:none; position:fixed; top:0; left:0; right:0; z-index:9999;
      background:#b91c1c; color:#fff; text-align:center; padding:8px 16px; font-size:13px; font-weight:600; }
    #ccaf-offline-banner.visible { display:block; }
    #ccaf-pending-badge { display:none; position:fixed; bottom:20px; right:16px; z-index:9998;
      background:#ea580c; color:#fff; border-radius:50px; padding:8px 14px; font-size:13px; font-weight:700;
      box-shadow:0 2px 8px rgba(0,0,0,0.3); cursor:pointer; }
    #ccaf-pending-badge.visible { display:block; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const API_BASE = "https://doc-comite-finanzas-production.up.railway.app/api";

async function parsearRespuesta(r) {
  const tipo = r.headers.get("content-type") || "";
  if (!tipo.includes("application/json")) {
    throw new Error(`Esta función todavía no está disponible en el servidor (ruta ${new URL(r.url).pathname}). Pide que se despliegue el backend actualizado.`);
  }
  const datos = await r.json();
  if (!r.ok) throw new Error(datos?.error || "Error de conexión");
  return datos;
}
let currentPassword = localStorage.getItem("ccaf_password") || "";
function setCurrentPassword(p) { currentPassword = p || ""; localStorage.setItem("ccaf_password", currentPassword); }

async function apiGet(ruta, code) {
  const r = await fetch(API_BASE + ruta, { headers: { "X-Code": code, "X-Password": currentPassword } });
  return parsearRespuesta(r);
}
async function apiPost(ruta, code, body) {
  const r = await fetch(API_BASE + ruta, { method: "POST", headers: { "Content-Type": "application/json", "X-Code": code, "X-Password": currentPassword }, body: JSON.stringify(body) });
  return parsearRespuesta(r);
}
async function apiPut(ruta, code, body) {
  const r = await fetch(API_BASE + ruta, { method: "PUT", headers: { "Content-Type": "application/json", "X-Code": code, "X-Password": currentPassword }, body: JSON.stringify(body) });
  return parsearRespuesta(r);
}
async function apiDelete(ruta, code) {
  const r = await fetch(API_BASE + ruta, { method: "DELETE", headers: { "X-Code": code, "X-Password": currentPassword } });
  return parsearRespuesta(r);
}
async function apiUpload(ruta, code, archivo) {
  const form = new FormData();
  form.append("archivo", archivo);
  const r = await fetch(API_BASE + ruta, { method: "POST", headers: { "X-Code": code, "X-Password": currentPassword }, body: form });
  return parsearRespuesta(r);
}
function descargarExcel(ruta, code, nombreSugerido) {
  fetch(API_BASE + ruta, { headers: { "X-Code": code, "X-Password": currentPassword } })
    .then(r => r.blob())
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = nombreSugerido; document.body.appendChild(a); a.click();
      a.remove(); URL.revokeObjectURL(url);
    });
}

// Resumen en Word — misma librería (docx por CDN) y estilo que usan Finanzas
// Cafeteros y Plan de Mejora de Calidad para sus descargas.
async function descargarResumenWord(code, r) {
  try {
    const { Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell, WidthType, BorderStyle, ShadingType, VerticalAlign } = window.docx;
    const fecha = new Date().toLocaleDateString("es-CO", { year: "numeric", month: "long", day: "numeric" });
    const COL = { earth: "2C1810", roast: "5C3A21", bark: "8B5E3C", fog: "EDE4D0", borde: "DDD5C4" };
    const sinBordes = { top: { style: BorderStyle.NONE }, bottom: { style: BorderStyle.NONE }, left: { style: BorderStyle.NONE }, right: { style: BorderStyle.NONE } };
    const bordeFino = { style: BorderStyle.SINGLE, size: 4, color: COL.borde };
    const conBordes = { top: bordeFino, bottom: bordeFino, left: bordeFino, right: bordeFino };
    const celda = (texto, opts = {}) => new TableCell({
      borders: opts.sinBorde ? sinBordes : conBordes,
      shading: opts.bg ? { type: ShadingType.SOLID, color: opts.bg } : undefined,
      verticalAlign: VerticalAlign.CENTER,
      margins: { top: 60, bottom: 60, left: 80, right: 80 },
      children: [new Paragraph({ children: [new TextRun({ text: texto ?? "", bold: !!opts.bold, color: opts.color, size: opts.size || 18 })] })],
    });
    const tituloSeccion = texto => new Paragraph({ spacing: { after: 80, before: 200 }, children: [new TextRun({ text: texto.toUpperCase(), bold: true, size: 18, color: COL.roast })] });
    const tabla = (cab, filas) => new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: [
      new TableRow({ children: cab.map(c => celda(c, { bold: true, bg: COL.fog, color: COL.roast })) }),
      ...(filas.length ? filas.map(f => new TableRow({ children: f.map(v => celda(String(v))) })) : [new TableRow({ children: cab.map(() => celda("—")) })]),
    ] });

    const variedades = Object.entries(r.porVariedad || {}).filter(([, d]) => d.kg > 0);
    const meses = Object.entries(r.porMes || {}).filter(([, d]) => d.kg > 0);
    const clientesResumen = Object.entries(r.porCliente || {});

    const doc = new Document({ sections: [{ children: [
      new Paragraph({ children: [new TextRun({ text: "📦 ", size: 32 }), new TextRun({ text: "Resumen de Comercialización de Café", bold: true, size: 28, color: COL.earth })] }),
      new Paragraph({ spacing: { after: 200 }, children: [new TextRun({ text: `Código ${code} · Generado el ${fecha}`, size: 18, color: COL.bark })] }),
      tituloSeccion("Totales"),
      tabla(["Total kg", "Ingreso total", "Margen producto", "Margen neto", "Pedidos"], [[
        fmtKg(r.totalKg), fmtCOP(r.ingresoTotal), `${fmtCOP(r.margenProductoTotal)} (${fmtPct(r.margenProductoPct)})`, `${fmtCOP(r.margenNetoTotal)} (${fmtPct(r.margenNetoPct)})`, r.numPedidos,
      ]]),
      tituloSeccion("Por variedad"),
      tabla(["Variedad", "Kg", "Ingreso", "Margen neto"], variedades.map(([k, d]) => [k, fmtKg(d.kg), fmtCOP(d.ingreso), fmtCOP(d.margenNeto)])),
      tituloSeccion("Por mes"),
      tabla(["Mes", "Kg", "Ingreso"], meses.map(([k, d]) => [k, fmtKg(d.kg), fmtCOP(d.ingreso)])),
      tituloSeccion("Por cliente"),
      tabla(["Cliente", "Kg", "Ingreso"], clientesResumen.map(([id, d]) => [d.nombreCliente || id, fmtKg(d.kg), fmtCOP(d.ingreso)])),
    ] }] });
    const blob = await Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `resumen-comercializacion-${code}-${new Date().toISOString().slice(0,10)}.docx`; a.click();
    URL.revokeObjectURL(url);
  } catch (e) { window.alert("No se pudo generar el documento Word: " + (e.message || e)); }
}

const C = {
  earth: "#2C1810", roast: "#5C3A21", bark: "#8B5E3C", clay: "#C4956A",
  cream: "#F5EDD8", fog: "#EDE4D0", leaf: "#3A5C2A",
  mist: "#C8D9B5", alert: "#C0392B", warn: "#D4851A", ok: "#3A5C2A",
  white: "#FDFAF4",
};
const fmtCOP = n => (n == null || isNaN(n)) ? "—" : Math.round(n).toLocaleString("es-CO") + " COP";
const fmtKg = n => (n == null || isNaN(n)) ? "—" : Number(n).toLocaleString("es-CO") + " kg";
const fmtPct = n => (n == null || isNaN(n)) ? "—" : n.toLocaleString("es-CO") + "%";
const fmtFecha = s => { if (!s) return "—"; const d = new Date(s); return isNaN(d) ? s : d.toLocaleDateString("es-CO"); };

// ── COMPONENTES BASE ──────────────────────────────────────────────────────────
function Campo({ label, value, onChange, tipo = "text", placeholder, opciones }) {
  if (opciones) {
    return (
      <div style={{ marginBottom: 10 }}>
        <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: C.bark, marginBottom: 3 }}>{label}</label>
        <select value={value ?? ""} onChange={e => onChange(e.target.value)}
          style={{ width: "100%", padding: "9px 10px", borderRadius: 8, border: `1.5px solid ${C.clay}`, background: C.white, color: C.earth }}>
          <option value="">— Elige —</option>
          {opciones.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      </div>
    );
  }
  return (
    <div style={{ marginBottom: 10 }}>
      <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: C.bark, marginBottom: 3 }}>{label}</label>
      <input type={tipo} value={value ?? ""} onChange={e => onChange(tipo === "number" ? (e.target.value === "" ? "" : parseFloat(e.target.value)) : e.target.value)} placeholder={placeholder}
        style={{ width: "100%", padding: "9px 10px", borderRadius: 8, border: `1.5px solid ${C.clay}`, background: C.white, color: C.earth }} />
    </div>
  );
}
function Boton({ children, onClick, color = C.roast, disabled, full = true, small }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width: full ? "100%" : "auto", borderRadius: small ? 8 : 12, border: "none",
      padding: small ? "8px 12px" : "13px 0", background: color, color: C.cream,
      fontSize: small ? 12 : 15, fontWeight: 800, opacity: disabled ? 0.6 : 1,
    }}>{children}</button>
  );
}
function Tarjeta({ children, style }) {
  return <div style={{ background: C.white, borderRadius: 12, padding: 14, marginBottom: 12, boxShadow: "0 2px 6px rgba(0,0,0,0.08)", ...style }}>{children}</div>;
}
function Titulo({ children }) {
  return <h3 style={{ fontSize: 12, fontWeight: 900, color: C.roast, textTransform: "uppercase", letterSpacing: 1, margin: "16px 0 10px" }}>{children}</h3>;
}

// ── LOGIN ──────────────────────────────────────────────────────────────────────
function Login({ onLogin, codigoInicial, errorInicial }) {
  const [codigo, setCodigo] = useState(() => codigoInicial || new URLSearchParams(location.search).get("code")?.toUpperCase() || "");
  const [password, setPassword] = useState("");
  const [cargando, setCargando] = useState(false);
  const [error, setError] = useState(errorInicial || "");

  const entrar = async () => {
    const c = codigo.trim().toUpperCase();
    if (!c) { setError("Escribe tu código"); return; }
    setCargando(true); setError("");
    setCurrentPassword(password);
    try {
      const who = await apiGet("/whoami", c);
      onLogin(who);
    } catch (e) {
      setError(e.message === "Contraseña incorrecta" ? "⚠️ Contraseña incorrecta" : "Código no reconocido. Verifica con tu formador.");
      setCurrentPassword("");
    } finally { setCargando(false); }
  };

  return (
    <div style={{ minHeight: "100vh", background: C.cream, maxWidth: 480, margin: "0 auto",
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ fontSize: 48, marginBottom: 8 }}>📦</div>
      <h1 style={{ fontSize: 20, fontWeight: 900, color: C.earth, marginBottom: 4, textAlign: "center" }}>Finanzas Ventas Café</h1>
      <p style={{ fontSize: 13, color: C.bark, marginBottom: 28, textAlign: "center" }}>Ubuntu Café · San Adolfo y Acevedo, Huila</p>
      <label style={{ display: "block", fontSize: 14, fontWeight: 700, color: C.earth, marginBottom: 8, alignSelf: "flex-start" }}>
        Tu código (el mismo de Finanzas y Diagnóstico)
      </label>
      <input
        type="text" value={codigo} autoFocus
        onChange={e => { setCodigo(e.target.value); setError(""); }}
        onKeyDown={e => e.key === "Enter" && entrar()}
        placeholder="Ej. SA-01"
        style={{ width: "100%", padding: "13px 16px", border: `2px solid ${error ? C.alert : C.clay}`,
          borderRadius: 10, fontSize: 18, textAlign: "center", textTransform: "uppercase",
          background: C.white, color: C.earth, outline: "none", marginBottom: 10 }}
      />
      <label style={{ display: "block", fontSize: 12, fontWeight: 700, color: C.bark, marginBottom: 6, alignSelf: "flex-start" }}>
        Contraseña (si tu formador te asignó una)
      </label>
      <input
        type="password" value={password}
        onChange={e => { setPassword(e.target.value); setError(""); }}
        onKeyDown={e => e.key === "Enter" && entrar()}
        placeholder="Déjalo vacío si no tienes"
        style={{ width: "100%", padding: "13px 16px", border: `2px solid ${C.clay}`,
          borderRadius: 10, fontSize: 16, textAlign: "center",
          background: C.white, color: C.earth, outline: "none", marginBottom: 10 }}
      />
      {error && <p style={{ color: C.alert, fontSize: 13, marginBottom: 10 }}>{error}</p>}
      <Boton onClick={entrar} disabled={cargando}>{cargando ? "Verificando…" : "Entrar →"}</Boton>
    </div>
  );
}

// ── TAB: MIS DATOS (identidad mínima para facturar, se rellena una sola vez) ──
function MisDatos({ code }) {
  const [datos, setDatos] = useState(null);
  const [mensaje, setMensaje] = useState("");
  const [guardando, setGuardando] = useState(false);

  useEffect(() => { apiGet("/comercializacion/finca", code).then(setDatos); }, []);

  const guardar = async () => {
    setGuardando(true); setMensaje("");
    try { setDatos(await apiPut("/comercializacion/finca", code, datos)); setMensaje("✅ Guardado"); }
    catch (e) { setMensaje("⚠️ " + e.message); }
    finally { setGuardando(false); }
  };
  const campo = (k, v) => setDatos(d => ({ ...d, [k]: v }));

  if (!datos) return <div style={{ padding: 20, color: C.bark }}>Cargando…</div>;
  const tiposPersona = [
    { value: "natural", label: "Persona natural / Autónomo" },
    { value: "juridica", label: "Persona jurídica / Empresa" },
  ];

  return (
    <div className="seccion" style={{ padding: "12px 16px 40px" }}>
      <Tarjeta style={{ background: C.fog }}>
        <div style={{ fontSize: 12, color: C.roast, lineHeight: 1.5 }}>
          Son tus datos como vendedor: los mínimos que se necesitan para poder facturar tus ventas. Se rellenan una sola vez — no hace falta repetirlos en cada venta.
        </div>
      </Tarjeta>
      <Tarjeta>
        <Campo label="Nombre / Razón social" value={datos.nombreFinca} onChange={v => campo("nombreFinca", v)} />
        <Campo label="Tipo" value={datos.tipoPersona} onChange={v => campo("tipoPersona", v)} opciones={tiposPersona} />
        <Campo label="Identificador fiscal (NIT o cédula)" value={datos.identificadorFiscal} onChange={v => campo("identificadorFiscal", v)} />
        <Campo label="Dirección" value={datos.direccion} onChange={v => campo("direccion", v)} />
        <Campo label="Teléfono / WhatsApp" value={datos.telefono} onChange={v => campo("telefono", v)} />
      </Tarjeta>
      {mensaje && <div style={{ fontSize: 12, color: C.roast, margin: "12px 0" }}>{mensaje}</div>}
      <Boton onClick={guardar} disabled={guardando} color={C.leaf}>{guardando ? "Guardando…" : "💾 Guardar"}</Boton>
    </div>
  );
}

// ── TAB 2: MIS CLIENTES ────────────────────────────────────────────────────────
function MisClientes({ code, listasRef, onCambio }) {
  const [clientes, setClientes] = useState([]);
  const [cargando, setCargando] = useState(true);
  const [mostrarForm, setMostrarForm] = useState(false);
  const vacio = { nombre: "", tipoActor: "", pais: "", ciudad: "", etapasQueCompra: "", incotermHabitual: "", condicionPago: "", activo: true };
  const [form, setForm] = useState(vacio);
  const [mensaje, setMensaje] = useState("");

  const cargar = () => apiGet("/comercializacion/clientes", code).then(d => { setClientes(d.clientes || []); onCambio && onCambio(d.clientes || []); }).finally(() => setCargando(false));
  useEffect(() => { cargar(); }, []);

  const agregar = async () => {
    if (!form.nombre) { setMensaje("⚠️ Ponle un nombre al cliente"); return; }
    try { await apiPost("/comercializacion/clientes", code, form); setForm(vacio); setMostrarForm(false); cargar(); }
    catch (e) { setMensaje("⚠️ " + e.message); }
  };
  const borrar = async (id) => { if (!confirm("¿Borrar este cliente?")) return; await apiDelete(`/comercializacion/clientes/${id}`, code); cargar(); };

  const tipos = (listasRef.tiposCliente || []).map(t => ({ value: t.id, label: t.label }));
  const incoterms = (listasRef.incoterms || []).map(i => ({ value: i.id, label: i.label }));

  if (cargando) return <div style={{ padding: 20, color: C.bark }}>Cargando…</div>;
  return (
    <div className="seccion" style={{ padding: "12px 16px 100px" }}>
      <Boton onClick={() => setMostrarForm(s => !s)} small full={false}>{mostrarForm ? "Cancelar" : "+ Nuevo cliente"}</Boton>
      {mostrarForm && (
        <Tarjeta style={{ marginTop: 10 }}>
          <Campo label="Nombre / Razón social" value={form.nombre} onChange={v => setForm(f => ({ ...f, nombre: v }))} />
          <Campo label="Tipo de actor" value={form.tipoActor} onChange={v => setForm(f => ({ ...f, tipoActor: v }))} opciones={tipos} />
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}><Campo label="País" value={form.pais} onChange={v => setForm(f => ({ ...f, pais: v }))} /></div>
            <div style={{ flex: 1 }}><Campo label="Ciudad" value={form.ciudad} onChange={v => setForm(f => ({ ...f, ciudad: v }))} /></div>
          </div>
          <Campo label="Etapas que compra" value={form.etapasQueCompra} onChange={v => setForm(f => ({ ...f, etapasQueCompra: v }))} placeholder="Ej. E3/E4" />
          <Campo label="Incoterm habitual" value={form.incotermHabitual} onChange={v => setForm(f => ({ ...f, incotermHabitual: v }))} opciones={incoterms} />
          <Campo label="Condición de pago" value={form.condicionPago} onChange={v => setForm(f => ({ ...f, condicionPago: v }))} placeholder="Ej. 30 días, contado…" />
          <Boton onClick={agregar} color={C.leaf}>Guardar cliente</Boton>
        </Tarjeta>
      )}
      {mensaje && <div style={{ fontSize: 12, color: C.roast, margin: "10px 0" }}>{mensaje}</div>}
      <Titulo>Mis clientes ({clientes.length})</Titulo>
      {clientes.length === 0 && <div style={{ fontSize: 13, color: C.bark }}>Todavía no tienes clientes registrados.</div>}
      {clientes.map(c => (
        <Tarjeta key={c.id}>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: C.earth }}>{c.nombre}</div>
            <button onClick={() => borrar(c.id)} style={{ background: "none", border: "none", color: C.bark, fontSize: 12 }}>✕</button>
          </div>
          <div style={{ fontSize: 12, color: C.roast, marginTop: 2 }}>{tipos.find(t => t.value === c.tipoActor)?.label || c.tipoActor} · {c.pais}{c.ciudad ? `, ${c.ciudad}` : ""}</div>
          <div style={{ fontSize: 11, color: C.bark, marginTop: 2 }}>Compra: {c.etapasQueCompra || "—"} · Incoterm: {c.incotermHabitual || "—"}</div>
        </Tarjeta>
      ))}
    </div>
  );
}

// ── TAB 3: MIS VENTAS ──────────────────────────────────────────────────────────
function MisVentas({ code, listasRef }) {
  const [ventas, setVentas] = useState([]);
  const [clientes, setClientes] = useState([]);
  const [cargando, setCargando] = useState(true);
  const [mostrarForm, setMostrarForm] = useState(false);
  const vacio = { fecha: "", variedad: "", clienteId: "", etapa: "", cantidad: "", precio: "", moneda: "COP", costeLogistico: 0 };
  const [form, setForm] = useState(vacio);
  const [editandoId, setEditandoId] = useState(null);
  const [mensaje, setMensaje] = useState("");

  const cargar = () => Promise.all([
    apiGet("/comercializacion/ventas", code),
    apiGet("/comercializacion/clientes", code),
  ]).then(([v, c]) => { setVentas(v.ventas || []); setClientes(c.clientes || []); }).finally(() => setCargando(false));
  useEffect(() => { cargar(); }, []);

  const agregar = async () => {
    if (!form.cantidad || !form.precio || !form.clienteId || !form.etapa) { setMensaje("⚠️ Completa cantidad, precio, cliente y etapa"); return; }
    try {
      if (editandoId) await apiPut(`/comercializacion/ventas/${editandoId}`, code, form);
      else await apiPost("/comercializacion/ventas", code, form);
      setForm(vacio); setEditandoId(null); setMostrarForm(false); cargar();
    }
    catch (e) { setMensaje("⚠️ " + e.message); }
  };
  const editar = (v) => {
    setForm({ fecha: v.fecha || "", variedad: v.variedad || "", clienteId: v.clienteId || "", etapa: v.etapa || "", cantidad: v.cantidad || "", precio: v.precio || "", moneda: v.moneda || "COP", costeLogistico: v.costeLogistico || 0 });
    setEditandoId(v.id);
    setMostrarForm(true);
  };
  const cancelarForm = () => { setForm(vacio); setEditandoId(null); setMostrarForm(false); };
  const borrar = async (id) => { if (!confirm("¿Borrar esta venta?")) return; await apiDelete(`/comercializacion/ventas/${id}`, code); cargar(); };

  const variedades = (listasRef.variedades || []).map(v => ({ value: v.nombre, label: v.nombre }));
  const etapas = (listasRef.etapas || []).map(e => ({ value: e.id, label: `${e.id} — ${e.label}` }));
  const monedas = (listasRef.monedas || ["COP", "USD", "EUR"]).map(m => ({ value: m, label: m }));
  const clientesOp = clientes.map(c => ({ value: c.id, label: c.nombre }));

  if (cargando) return <div style={{ padding: 20, color: C.bark }}>Cargando…</div>;
  return (
    <div className="seccion" style={{ padding: "12px 16px 100px" }}>
      <Boton onClick={() => mostrarForm ? cancelarForm() : setMostrarForm(true)} small full={false}>{mostrarForm ? "Cancelar" : "+ Nueva venta"}</Boton>
      {mostrarForm && (
        <Tarjeta style={{ marginTop: 10 }}>
          {editandoId && <div style={{ fontSize: 12, color: C.roast, marginBottom: 8 }}>✎ Editando venta existente</div>}
          {clientes.length === 0 && <div style={{ fontSize: 12, color: C.warn, marginBottom: 8 }}>⚠️ Primero añade un cliente en la pestaña "Mis clientes".</div>}
          <Campo label="Fecha" tipo="date" value={form.fecha} onChange={v => setForm(f => ({ ...f, fecha: v }))} />
          <Campo label="Variedad" value={form.variedad} onChange={v => setForm(f => ({ ...f, variedad: v }))} opciones={variedades} />
          <Campo label="Cliente" value={form.clienteId} onChange={v => setForm(f => ({ ...f, clienteId: v }))} opciones={clientesOp} />
          <Campo label="Etapa de venta" value={form.etapa} onChange={v => setForm(f => ({ ...f, etapa: v }))} opciones={etapas} />
          <div style={{ display: "flex", gap: 8 }}>
            <div style={{ flex: 1 }}><Campo label="Cantidad (kg)" tipo="number" value={form.cantidad} onChange={v => setForm(f => ({ ...f, cantidad: v }))} /></div>
            <div style={{ flex: 1 }}><Campo label="Precio" tipo="number" value={form.precio} onChange={v => setForm(f => ({ ...f, precio: v }))} /></div>
            <div style={{ flex: 1 }}><Campo label="Moneda" value={form.moneda} onChange={v => setForm(f => ({ ...f, moneda: v }))} opciones={monedas} /></div>
          </div>
          <Campo label="Coste logístico (COP, opcional)" tipo="number" value={form.costeLogistico} onChange={v => setForm(f => ({ ...f, costeLogistico: v }))} />
          <Boton onClick={agregar} color={C.leaf}>{editandoId ? "Guardar cambios" : "Guardar venta"}</Boton>
        </Tarjeta>
      )}
      {mensaje && <div style={{ fontSize: 12, color: C.roast, margin: "10px 0" }}>{mensaje}</div>}
      <Titulo>Historial de ventas ({ventas.length})</Titulo>
      {ventas.length === 0 && <div style={{ fontSize: 13, color: C.bark }}>Todavía no has registrado ninguna venta.</div>}
      {ventas.slice().reverse().map(v => (
        <Tarjeta key={v.id} style={{ borderLeft: `4px solid ${v.margenNetoCOP >= 0 ? C.leaf : C.alert}` }}>
          <div style={{ display: "flex", justifyContent: "space-between" }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: C.earth }}>{v.nombreCliente || "Sin cliente"}</div>
            <div>
              <button onClick={() => editar(v)} style={{ background: "none", border: "none", color: C.bark, fontSize: 12, marginRight: 8 }}>✎</button>
              <button onClick={() => borrar(v.id)} style={{ background: "none", border: "none", color: C.bark, fontSize: 12 }}>✕</button>
            </div>
          </div>
          <div style={{ fontSize: 12, color: C.roast, marginTop: 4 }}>{v.fecha || "Sin fecha"} · {v.variedad} · {v.etapa} · {fmtKg(v.cantidad)} a {v.precio} {v.moneda}/kg</div>
          <div style={{ fontSize: 12, color: C.bark, marginTop: 2 }}>Ingreso: {fmtCOP(v.ingresoTotalCOP)} · Margen producto: {fmtCOP(v.margenProductoCOP)} ({fmtPct(v.margenProductoPct)}) · Margen neto: {fmtCOP(v.margenNetoCOP)} ({fmtPct(v.margenNetoPct)})</div>
          {(v.registradoEn || v.actualizadoEn) && <div style={{ fontSize: 10, color: C.fog, marginTop: 4 }}>{v.actualizadoEn ? `Editado ${fmtFecha(v.actualizadoEn)}` : `Registrado ${fmtFecha(v.registradoEn)}`}</div>}
        </Tarjeta>
      ))}
    </div>
  );
}

// ── TAB 4: MI RESUMEN ──────────────────────────────────────────────────────────
function KPI({ label, valor, color }) {
  return (
    <div style={{ flex: 1, minWidth: 120 }}>
      <div style={{ fontSize: 10, color: C.fog, fontWeight: 700, textTransform: "uppercase" }}>{label}</div>
      <div style={{ fontSize: 17, fontWeight: 900, color: color || C.cream }}>{valor}</div>
    </div>
  );
}
function MiResumen({ code }) {
  const [r, setR] = useState(null);
  useEffect(() => { apiGet("/comercializacion/resumen", code).then(setR); }, []);
  if (!r) return <div style={{ padding: 20, color: C.bark }}>Cargando…</div>;
  const variedades = Object.entries(r.porVariedad || {}).filter(([, d]) => d.kg > 0);
  const meses = Object.entries(r.porMes || {}).filter(([, d]) => d.kg > 0);
  const clientesResumen = Object.entries(r.porCliente || {});

  return (
    <div className="seccion" style={{ padding: "12px 16px 100px" }}>
      <Tarjeta style={{ background: C.earth }}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 12, marginBottom: 10 }}>
          <KPI label="Total kg vendidos" valor={fmtKg(r.totalKg)} />
          <KPI label="Ingreso total" valor={fmtCOP(r.ingresoTotal)} />
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
          <KPI label="Margen producto" valor={`${fmtCOP(r.margenProductoTotal)} (${fmtPct(r.margenProductoPct)})`} color={r.margenProductoTotal >= 0 ? C.mist : "#F0A0A0"} />
          <KPI label="Margen neto" valor={`${fmtCOP(r.margenNetoTotal)} (${fmtPct(r.margenNetoPct)})`} color={r.margenNetoTotal >= 0 ? C.mist : "#F0A0A0"} />
        </div>
        <div style={{ fontSize: 12, color: C.clay, marginTop: 10 }}>{r.numPedidos} pedidos · {r.numClientesDistintos} clientes distintos</div>
      </Tarjeta>

      <Titulo>Ventas por variedad</Titulo>
      <Tarjeta>
        {variedades.length === 0 && <div style={{ fontSize: 12, color: C.bark }}>Sin ventas todavía.</div>}
        {variedades.length > 0 && (
          <table><thead><tr><th>Variedad</th><th>Kg</th><th>Ingreso</th><th>Mg Neto</th></tr></thead>
            <tbody>{variedades.map(([k, d]) => <tr key={k}><td>{k}</td><td>{fmtKg(d.kg)}</td><td>{fmtCOP(d.ingreso)}</td><td>{fmtCOP(d.margenNeto)}</td></tr>)}</tbody>
          </table>
        )}
      </Tarjeta>

      <Titulo>Ventas por mes</Titulo>
      <Tarjeta>
        {meses.length === 0 && <div style={{ fontSize: 12, color: C.bark }}>Sin ventas todavía.</div>}
        {meses.length > 0 && (
          <table><thead><tr><th>Mes</th><th>Kg</th><th>Ingreso</th></tr></thead>
            <tbody>{meses.map(([k, d]) => <tr key={k}><td>{k}</td><td>{fmtKg(d.kg)}</td><td>{fmtCOP(d.ingreso)}</td></tr>)}</tbody>
          </table>
        )}
      </Tarjeta>

      <Titulo>Ventas por cliente</Titulo>
      <Tarjeta>
        {clientesResumen.length === 0 && <div style={{ fontSize: 12, color: C.bark }}>Sin ventas todavía.</div>}
        {clientesResumen.length > 0 && (
          <table><thead><tr><th>Cliente</th><th>Kg</th><th>Ingreso</th></tr></thead>
            <tbody>{clientesResumen.map(([id, d]) => <tr key={id}><td>{d.nombreCliente || id}</td><td>{fmtKg(d.kg)}</td><td>{fmtCOP(d.ingreso)}</td></tr>)}</tbody>
          </table>
        )}
      </Tarjeta>
      <Boton onClick={() => descargarExcel("/comercializacion/mis-datos/excel", code, `comercializacion-${code}.xlsx`)} color={C.bark}>📥 Descargar mi libro Excel</Boton>
      <div style={{ height: 8 }} />
      <Boton onClick={() => descargarResumenWord(code, r)} color={C.roast}>📄 Descargar resumen en Word</Boton>
    </div>
  );
}

// ── TAB: PARÁMETROS ─────────────────────────────────────────────────────────────
function Parametros({ code }) {
  const [p, setP] = useState(null);
  const [mensaje, setMensaje] = useState("");
  const [guardando, setGuardando] = useState(false);
  const [importando, setImportando] = useState(false);
  const [resultadoImport, setResultadoImport] = useState(null);
  useEffect(() => { apiGet("/comercializacion/parametros", code).then(setP); }, []);

  const guardar = async () => {
    setGuardando(true); setMensaje("");
    try { setP(await apiPut("/comercializacion/parametros", code, p)); setMensaje("✅ Guardado"); }
    catch (e) { setMensaje("⚠️ " + e.message); }
    finally { setGuardando(false); }
  };
  const importarArchivo = async (e) => {
    const archivo = e.target.files?.[0];
    e.target.value = "";
    if (!archivo) return;
    setImportando(true); setResultadoImport(null);
    try {
      const r = await apiUpload("/comercializacion/importar-excel", code, archivo);
      setResultadoImport({ ok: true, ...r });
      apiGet("/comercializacion/parametros", code).then(setP);
    } catch (err) {
      setResultadoImport({ ok: false, error: err.message });
    } finally {
      setImportando(false);
    }
  };
  if (!p) return <div style={{ padding: 20, color: C.bark }}>Cargando…</div>;
  const setRend = (k, v) => setP(x => ({ ...x, rendimientos: { ...x.rendimientos, [k]: v } }));
  const setCoste = (k, v) => setP(x => ({ ...x, costesReferenciaPorEtapa: { ...x.costesReferenciaPorEtapa, [k]: v } }));

  return (
    <div className="seccion" style={{ padding: "12px 16px 100px" }}>
      <Tarjeta style={{ background: C.fog }}>
        <div style={{ fontSize: 12, color: C.roast, lineHeight: 1.5 }}>
          Estos valores tienen defaults razonables para Huila. Solo cámbialos si conoces mejor tu costo real.
        </div>
      </Tarjeta>
      <Titulo>Tipos de cambio</Titulo>
      <Tarjeta>
        <Campo label="Tasa COP/USD" tipo="number" value={p.tasaCambioUSD} onChange={v => setP(x => ({ ...x, tasaCambioUSD: v }))} />
        <Campo label="Tasa COP/EUR" tipo="number" value={p.tasaCambioEUR} onChange={v => setP(x => ({ ...x, tasaCambioEUR: v }))} />
      </Tarjeta>
      <Titulo>Rendimientos por etapa (mermas)</Titulo>
      <Tarjeta>
        <Campo label="Cereza → Café en baba" tipo="number" value={p.rendimientos?.cerezaABaba} onChange={v => setRend("cerezaABaba", v)} />
        <Campo label="Baba → Pergamino seco" tipo="number" value={p.rendimientos?.babaAPergamino} onChange={v => setRend("babaAPergamino", v)} />
        <Campo label="Pergamino → Excelso" tipo="number" value={p.rendimientos?.pergaminoAExcelso} onChange={v => setRend("pergaminoAExcelso", v)} />
        <Campo label="Excelso → Tostado" tipo="number" value={p.rendimientos?.excelsoATostado} onChange={v => setRend("excelsoATostado", v)} />
      </Tarjeta>
      <Titulo>Costes de referencia por etapa (COP/kg salida)</Titulo>
      <Tarjeta>
        {["E1", "E2", "E3", "E4", "E5", "E6"].map(e => (
          <Campo key={e} label={e} tipo="number" value={p.costesReferenciaPorEtapa?.[e]} onChange={v => setCoste(e, v)} />
        ))}
      </Tarjeta>
      {mensaje && <div style={{ fontSize: 12, color: C.roast, margin: "10px 0" }}>{mensaje}</div>}
      <Boton onClick={guardar} disabled={guardando} color={C.leaf}>{guardando ? "Guardando…" : "💾 Guardar"}</Boton>

      <Titulo>Trabajar sin internet en el computador</Titulo>
      <Tarjeta>
        <div style={{ fontSize: 12, color: C.roast, lineHeight: 1.5, marginBottom: 10 }}>
          Descarga tu Excel ("Mi Resumen" → 📥 Descargar Excel), edita las hojas Finca_Producción, Clientes,
          Ventas y/o Parámetros sin conexión, y súbelo aquí para aplicar los cambios. No borra nada que no
          esté en el Excel — actualiza lo que coincida por ID o por nombre, y crea lo que sea nuevo.
        </div>
        <label style={{ display: "inline-block" }}>
          <input type="file" accept=".xlsx" onChange={importarArchivo} style={{ display: "none" }} disabled={importando} />
          <span style={{ display: "inline-block", background: importando ? C.fog : C.earth, color: importando ? C.bark : "#fff",
            padding: "10px 16px", borderRadius: 10, fontSize: 13, fontWeight: 800, cursor: importando ? "default" : "pointer" }}>
            {importando ? "Subiendo…" : "📤 Subir Excel"}
          </span>
        </label>
        {resultadoImport && resultadoImport.ok && (
          <div style={{ marginTop: 12, fontSize: 12.5, color: C.earth, lineHeight: 1.6 }}>
            ✅ Importado: {resultadoImport.clientesCreados} cliente(s) nuevo(s), {resultadoImport.clientesActualizados} actualizado(s) ·{" "}
            {resultadoImport.ventasCreadas} venta(s) nueva(s), {resultadoImport.ventasActualizadas} actualizada(s)
            {resultadoImport.parametrosActualizados ? " · parámetros actualizados" : ""}
            {resultadoImport.fincaActualizada ? " · ficha de productor actualizada" : ""}
            {resultadoImport.avisos?.length > 0 && (
              <div style={{ marginTop: 6, color: C.roast }}>
                {resultadoImport.avisos.map((a, i) => <div key={i}>⚠️ {a}</div>)}
              </div>
            )}
          </div>
        )}
        {resultadoImport && !resultadoImport.ok && (
          <div style={{ marginTop: 12, fontSize: 12.5, color: "#b71c1c" }}>⚠️ {resultadoImport.error}</div>
        )}
      </Tarjeta>
    </div>
  );
}

// ── PANEL DEL FORMADOR ─────────────────────────────────────────────────────────

  const [cargando, setCargando] = useState(true);
  useEffect(() => {
    apiGet("/admin/comercializacion/consolidado", code).then(setDatos).catch(() => setDatos({ porProductor: [] })).finally(() => setCargando(false));
  }, []);
  if (cargando) return <div style={{ padding: 20, color: C.bark }}>Cargando…</div>;
  return (
    <div style={{ maxWidth: 480, margin: "0 auto", minHeight: "100vh", background: C.cream }}>
      <div className="header-safe" style={{ background: C.earth, padding: "18px 16px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontSize: 16, fontWeight: 900, color: C.cream }}>Panel del Formador</div>
          <div style={{ fontSize: 11, color: C.clay }}>Finanzas Ventas Café — consolidado de la comunidad</div>
        </div>
        <button onClick={onLogout} style={{ background: "none", border: "none", color: C.clay, fontSize: 12 }}>Salir</button>
      </div>
      <div style={{ padding: 16 }}>
        <Tarjeta style={{ background: C.earth }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12, marginBottom: 10 }}>
            <KPI label="Total kg vendidos" valor={fmtKg(datos.totalKg)} />
            <KPI label="Ingreso total" valor={fmtCOP(datos.ingresoTotal)} />
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
            <KPI label="Margen producto" valor={`${fmtCOP(datos.margenProductoTotal)} (${fmtPct(datos.margenProductoPct)})`} />
            <KPI label="Margen neto" valor={`${fmtCOP(datos.margenNetoTotal)} (${fmtPct(datos.margenNetoPct)})`} />
          </div>
          <div style={{ fontSize: 12, color: C.clay, marginTop: 10 }}>{datos.numProductoresConVentas} productores con ventas registradas</div>
        </Tarjeta>

        <Titulo>Por productor</Titulo>
        {(datos.porProductor || []).length === 0 && <div style={{ fontSize: 13, color: C.bark }}>Todavía nadie ha registrado ventas.</div>}
        {(datos.porProductor || []).map(p => (
          <Tarjeta key={p.codigo}>
            <div style={{ fontWeight: 800, color: C.earth, fontSize: 14 }}>{p.codigo}</div>
            <div style={{ fontSize: 12, color: C.roast }}>{fmtKg(p.totalKg)} vendidos · {fmtCOP(p.ingresoTotal)}</div>
            <div style={{ fontSize: 11, color: C.bark }}>Margen neto: {fmtCOP(p.margenNetoTotal)} · {p.numPedidos} pedidos</div>
          </Tarjeta>
        ))}
        <Boton onClick={() => descargarExcel("/admin/comercializacion/excel", code, `comercializacion-consolidado-${new Date().toISOString().slice(0,10)}.xlsx`)} color={C.bark}>
          📥 Descargar consolidado Excel (para Operativo_Cafeteros)
        </Boton>
      </div>
    </div>
  );
}

// ── APP CAFICULTOR (tabs) ──────────────────────────────────────────────────────
function AppCaficultor({ code, onLogout }) {
  const [tab, setTab] = useState("ventas");
  const [listasRef, setListasRef] = useState(null);
  useEffect(() => { apiGet("/comercializacion/listas-ref", code).then(setListasRef).catch(() => setListasRef({})); }, []);

  // "Ventas" va primero y es la pestaña con la que se entra: el día a día es
  // registrar venta por venta. "Mis datos" (identidad fiscal) se rellena una
  // sola vez y queda relegada a la cuarta posición.
  const TABS = [
    { id: "ventas", label: "Ventas", icono: "🧾" },
    { id: "clientes", label: "Clientes", icono: "👥" },
    { id: "datos", label: "Mis datos", icono: "🪪" },
    { id: "resumen", label: "Resumen", icono: "📈" },
    { id: "parametros", label: "Parámetros", icono: "⚙️" },
  ];

  return (
    <div style={{ maxWidth: 480, margin: "0 auto", minHeight: "100vh", background: C.cream, display: "flex", flexDirection: "column" }}>
      {/* Cabecera + navegación fijas arriba (sticky), siempre visibles sin scroll */}
      <div style={{ position: "sticky", top: 0, zIndex: 10 }}>
        <div className="header-safe" style={{ background: C.earth, padding: "18px 16px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 16, fontWeight: 900, color: C.cream }}>Finanzas Ventas Café</div>
            <div style={{ fontSize: 11, color: C.clay }}>{code}</div>
          </div>
          <button onClick={onLogout} style={{ background: "none", border: "none", color: C.clay, fontSize: 12 }}>Salir</button>
        </div>
        <div style={{ display: "flex", background: C.white, borderBottom: `1px solid ${C.fog}` }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              flex: 1, background: "none", border: "none", padding: "8px 0",
              color: tab === t.id ? C.roast : C.bark, fontWeight: tab === t.id ? 900 : 600,
              borderBottom: `3px solid ${tab === t.id ? C.roast : "transparent"}`,
            }}>
              <div style={{ fontSize: 17 }}>{t.icono}</div>
              <div style={{ fontSize: 10 }}>{t.label}</div>
            </button>
          ))}
        </div>
      </div>
      <div className="scroll-area" style={{ flex: 1 }}>
        {!listasRef ? <div style={{ padding: 20, color: C.bark }}>Cargando…</div> : (
          tab === "ventas" ? <MisVentas code={code} listasRef={listasRef} /> :
          tab === "clientes" ? <MisClientes code={code} listasRef={listasRef} /> :
          tab === "datos" ? <MisDatos code={code} /> :
          tab === "resumen" ? <MiResumen code={code} /> :
          <Parametros code={code} />
        )}
      </div>
    </div>
  );
}

// ── APP raíz ───────────────────────────────────────────────────────────────────
function App() {
  const [code, setCode] = useState(() => localStorage.getItem("ccaf_code") || "");
  const [who, setWho] = useState(null);
  const [verificando, setVerificando] = useState(false);
  const [errorReautenticacion, setErrorReautenticacion] = useState("");

  useEffect(() => {
    if (!code) { setWho(null); return; }
    setVerificando(true);
    apiGet("/whoami", code).then(setWho).catch(e => {
      setWho(null);
      if (e.message === "Contraseña incorrecta") {
        setCurrentPassword("");
        setErrorReautenticacion("Tu contraseña no coincide (puede que el formador la haya cambiado). Vuelve a entrar.");
      } else {
        localStorage.removeItem("ccaf_code");
        localStorage.removeItem("ccaf_password");
        setCode("");
      }
    }).finally(() => setVerificando(false));
  }, [code]);

  const onLogin = (w) => { localStorage.setItem("ccaf_code", w.code); setCode(w.code); setWho(w); setErrorReautenticacion(""); };
  const onLogout = () => { localStorage.removeItem("ccaf_code"); localStorage.removeItem("ccaf_password"); setCurrentPassword(""); setCode(""); setWho(null); setErrorReautenticacion(""); };

  if (!code || errorReautenticacion) return <Login onLogin={onLogin} codigoInicial={code} errorInicial={errorReautenticacion} />;
  if (verificando || !who) return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: C.bark }}>Cargando…</div>;

  return who.role === "formador"
    ? <PanelFormador code={who.code} onLogout={onLogout} />
    : <AppCaficultor code={who.code} onLogout={onLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- Offline banner y badge -->
<div id="ccaf-offline-banner">⚠️ Sin conexión — los cambios se guardarán y sincronizarán al volver la señal</div>
<div id="ccaf-pending-badge" title="Cambios pendientes de sincronizar — toca para sincronizar ahora"></div>

<script>
(function initSW() {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('/comercializacion-cafe/sw.js', { scope: '/comercializacion-cafe/' })
    .then(function(reg) {
      navigator.serviceWorker.controller &&
        navigator.serviceWorker.controller.postMessage({ type: 'CCAF_GET_COUNT' });
      window.addEventListener('online', function() {
        _ccafOfflineBanner(false);
        if (reg.sync) reg.sync.register('ccaf-sync').catch(function(){});
        else navigator.serviceWorker.controller &&
          navigator.serviceWorker.controller.postMessage({ type: 'CCAF_SYNC_NOW' });
      });
      window.addEventListener('offline', function() { _ccafOfflineBanner(true); });
      if (!navigator.onLine) _ccafOfflineBanner(true);
    });
  navigator.serviceWorker.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'CCAF_QUEUE') _ccafPendingBadge(e.data.count);
    if (e.data && e.data.type === 'CCAF_SYNCED') {
      _ccafPendingBadge(0);
      _ccafToast('✅ ' + e.data.count + ' cambio' + (e.data.count > 1 ? 's' : '') + ' sincronizado' + (e.data.count > 1 ? 's' : ''));
    }
  });
})();

function _ccafOfflineBanner(show) {
  var el = document.getElementById('ccaf-offline-banner');
  if (el) el.classList.toggle('visible', show);
}
function _ccafPendingBadge(count) {
  var el = document.getElementById('ccaf-pending-badge');
  if (!el) return;
  if (count > 0) {
    el.textContent = '⏳ ' + count + ' pendiente' + (count > 1 ? 's' : '');
    el.classList.add('visible');
    el.onclick = function() {
      if (navigator.serviceWorker.controller)
        navigator.serviceWorker.controller.postMessage({ type: 'CCAF_SYNC_NOW' });
    };
  } else {
    el.classList.remove('visible');
  }
}
function _ccafToast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position:'fixed', bottom:'70px', left:'50%', transform:'translateX(-50%)',
    background:'#166534', color:'#fff', padding:'10px 20px', borderRadius:'8px',
    fontSize:'14px', fontWeight:'600', zIndex:'9999', pointerEvents:'none',
    boxShadow:'0 2px 8px rgba(0,0,0,0.3)', whiteSpace:'nowrap'
  });
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3500);
}
</script>
</body>
</html>
